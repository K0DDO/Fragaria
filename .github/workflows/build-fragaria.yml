name: Build Fragaria Installer

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'Fragaria/**'
      - '.github/workflows/build-fragaria.yml'

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: microsoft/setup-msbuild@v2

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.406'

      - name: Verify .NET SDK
        shell: pwsh
        run: dotnet --version

      - name: Publish Fragaria (self-contained)
        working-directory: Fragaria
        shell: pwsh
        run: |
          dotnet publish Fragaria\Fragaria.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:WindowsAppSDKSelfContained=true `
            -p:DisableMrtCoreCompilation=true `
            -p:EnableMsixTooling=false `
            -o dist\Fragaria

      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found at $iscc"
          }
          "ISCC=$iscc" >> $env:GITHUB_ENV

      - name: Compile installer
        shell: pwsh
        run: |
          & $env:ISCC "Fragaria\installer\Fragaria.iss" /OFragaria\dist

      - name: Upload portable build
        uses: actions/upload-artifact@v4
        with:
          name: Fragaria-portable
          path: Fragaria/dist/Fragaria/
          retention-days: 30

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: FragariaSetup
          path: Fragaria/dist/FragariaSetup.exe
          retention-days: 90
