name: Build Fragaria Installer

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'Fragaria/**'
      - '.github/workflows/build-fragaria.yml'

jobs:
  build-installer:
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: microsoft/setup-msbuild@v3

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.406'

      - name: Verify .NET SDK
        shell: pwsh
        run: dotnet --version

      - name: Publish Fragaria (self-contained)
        working-directory: Fragaria
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          msbuild Fragaria\Fragaria.csproj ^
            /restore ^
            /t:Publish ^
            /p:Configuration=Release ^
            /p:Platform=x64 ^
            /p:RuntimeIdentifier=win-x64 ^
            /p:SelfContained=true ^
            /p:WindowsAppSDKSelfContained=true ^
            /p:EnableMsixTooling=false ^
            /p:PublishDir=%CD%\dist\Fragaria\

      - name: Verify publish output
        shell: pwsh
        working-directory: Fragaria
        run: |
          $dist = "dist/Fragaria"
          if (-not (Test-Path "$dist/Fragaria.exe")) { throw "Fragaria.exe missing" }
          if (-not (Test-Path "$dist/Fragaria.pri")) { throw "Fragaria.pri missing — XAML resources not packaged" }
          $xbf = Get-ChildItem -Path $dist -Recurse -Filter *.xbf -ErrorAction SilentlyContinue
          if (-not $xbf) { throw "No .xbf files — XAML compile failed" }
          Write-Host "Publish OK: exe + pri + $($xbf.Count) xbf file(s)"

      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found at $iscc"
          }
          "ISCC=$iscc" >> $env:GITHUB_ENV

      - name: Download installer prerequisites
        shell: pwsh
        working-directory: Fragaria
        run: |
          New-Item -ItemType Directory -Force -Path installer/redist | Out-Null
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile installer/redist/vc_redist.x64.exe
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile installer/redist/MicrosoftEdgeWebview2Setup.exe

      - name: Compile installer
        shell: pwsh
        run: |
          & $env:ISCC "Fragaria\installer\Fragaria.iss" /OFragaria\dist

      - name: Upload portable build
        uses: actions/upload-artifact@v7
        with:
          name: Fragaria-portable
          path: Fragaria/dist/Fragaria/
          retention-days: 30

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: FragariaSetup
          path: Fragaria/dist/FragariaSetup.exe
          retention-days: 90
