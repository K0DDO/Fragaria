name: Build Fragaria Installer

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'Fragaria/**'
      - '.github/workflows/build-fragaria.yml'

jobs:
  build-installer:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: microsoft/setup-msbuild@v2

      - name: Install VS Build Tools for WinUI
        shell: pwsh
        run: |
          choco install visualstudio2022buildtools -y --no-progress `
            --package-parameters "--passive --norestart --add Microsoft.VisualStudio.Workload.ManagedDesktopBuildTools --add Microsoft.VisualStudio.ComponentGroup.WindowsAppSDK.Cs --includeRecommended"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.406'

      - name: Verify .NET SDK
        shell: pwsh
        run: dotnet --version

      - name: Publish Fragaria (self-contained)
        working-directory: Fragaria
        shell: pwsh
        run: |
          $msbuildCandidates = @(
            "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\BuildTools\MSBuild\Current\Bin\MSBuild.exe",
            "${env:ProgramFiles}\Microsoft Visual Studio\2022\BuildTools\MSBuild\Current\Bin\MSBuild.exe",
            "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe",
            "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\MSBuild.exe",
            "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\Professional\MSBuild\Current\Bin\MSBuild.exe"
          )
          $msbuild = $msbuildCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $msbuild) {
            Write-Error "MSBuild.exe not found"
            Get-ChildItem "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022" -Recurse -Filter MSBuild.exe -ErrorAction SilentlyContinue | Select-Object -First 5
            exit 1
          }
          Write-Host "Using MSBuild: $msbuild"
          & $msbuild Fragaria\Fragaria.csproj `
            /restore `
            /t:Publish `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:RuntimeIdentifier=win-x64 `
            /p:SelfContained=true `
            /p:WindowsAppSDKSelfContained=true `
            /p:EnableMsixTooling=false `
            /p:DisableMrtCoreCompilation=true `
            /p:PublishDir="$pwd\dist\Fragaria\"

      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found at $iscc"
          }
          "ISCC=$iscc" >> $env:GITHUB_ENV

      - name: Compile installer
        shell: pwsh
        run: |
          & $env:ISCC "Fragaria\installer\Fragaria.iss" /OFragaria\dist

      - name: Upload portable build
        uses: actions/upload-artifact@v4
        with:
          name: Fragaria-portable
          path: Fragaria/dist/Fragaria/
          retention-days: 30

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: FragariaSetup
          path: Fragaria/dist/FragariaSetup.exe
          retention-days: 90
